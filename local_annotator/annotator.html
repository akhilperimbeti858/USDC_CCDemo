<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Local NER Annotator (off-AWS)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #111; padding: 12px; }
  h1 { font-size: 16px; margin-bottom: 8px; }
  .muted { color: #888; font-size: 12px; }

  .topbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: #fff; border: 1px solid #ddd; border-radius: 10px;
    padding: 10px 12px; margin-bottom: 12px;
  }
  .topbar .spacer { flex: 1; }
  .btn {
    padding: 6px 12px; border: 1px solid #ccc; border-radius: 6px;
    background: #fff; cursor: pointer; font-size: 13px;
  }
  .btn.primary { background: #111; color: #fff; border-color: #111; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .nav { display: flex; align-items: center; gap: 8px; }
  .nav .pos { font-size: 13px; min-width: 90px; text-align: center; }
  .file-label {
    padding: 6px 12px; border: 1px solid #ccc; border-radius: 6px;
    background: #fafafa; cursor: pointer; font-size: 13px;
  }
  .file-label input { display: none; }

  .wrapper { display: flex; gap: 12px; align-items: flex-start; }
  .doc-col { flex: 1; min-width: 0; }
  .side-col { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }

  .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 12px; }
  .doc-id { font-size: 12px; color: #555; margin-bottom: 8px; word-break: break-all; }
  .labelbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .labelbar .lbl {
    padding: 4px 10px; border-radius: 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; color: #fff; border: none;
  }
  .labelbar .hint { font-size: 11px; color: #aaa; align-self: center; }
  .doc-status { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  .pill.todo { background: #fde68a; color: #92400e; }
  .pill.done { background: #bbf7d0; color: #166534; }
  #review-stat { font-size: 12px; color: #555; }

  #doc {
    white-space: pre-wrap; word-wrap: break-word; line-height: 1.9;
    font-size: 15px; min-height: 120px; padding: 6px 2px; user-select: text;
  }
  #doc .ent { border-radius: 3px; padding: 1px 1px; cursor: pointer; color: #111; }
  #ent-x {
    display: none; position: fixed; z-index: 9990;
    width: 18px; height: 18px; line-height: 17px; text-align: center;
    background: #b00; color: #fff; border-radius: 50%;
    font-size: 11px; font-weight: 700; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }

  .panel-title {
    font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase;
    letter-spacing: .05em; margin-bottom: 8px;
  }
  .panel-hint { font-size: 11px; color: #aaa; margin-bottom: 8px; }

  .ent-item {
    background: #f9f9f9; border-radius: 6px; padding: 8px 10px; font-size: 12px;
    border-left: 3px solid transparent; margin-bottom: 8px; position: relative;
  }
  .ent-item .span-text { font-weight: 600; font-size: 13px; cursor: pointer; padding-right: 18px; }
  .ent-item .span-meta { color: #888; margin-top: 2px; }
  .ent-item .rm { position: absolute; top: 6px; right: 8px; cursor: pointer; color: #b00; font-weight: 700; }
  .ofac-line { margin-top: 6px; }
  .ofac-val { cursor: pointer; font-weight: 600; border-bottom: 1px dashed #999; }
  .ofac-val.fill { color: #b45309; }
  .ofac-edit { color: #2563eb; margin-left: 6px; cursor: pointer; font-size: 11px; }

  #modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.25); z-index: 9998; }
  #modal {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px; width: 320px;
    z-index: 9999; box-shadow: 0 6px 24px rgba(0,0,0,.18);
  }
  #modal p { font-size: 13px; color: #555; margin-bottom: 8px; }
  #modal strong { color: #111; }
  #modal input { width: 100%; padding: 7px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; margin-bottom: 6px; }
  #modal .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  #toast {
    display: none; position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 13px; z-index: 10000;
  }
</style>
</head>
<body>

<h1>Local NER Annotator <span class="muted">— offline, no AWS</span></h1>

<div class="topbar">
  <label class="file-label">Load batch JSON
    <input type="file" id="file-batch" accept=".json,application/json">
  </label>
  <div class="nav">
    <button class="btn" id="prev" disabled>◀ Prev</button>
    <span class="pos" id="pos">— / —</span>
    <button class="btn" id="next" disabled>Next ▶</button>
  </div>
  <span id="review-stat"></span>
  <button class="btn" id="next-unreviewed" disabled>Next unreviewed ⏭</button>
  <div class="spacer"></div>
  <button class="btn primary" id="export" disabled>⬇ Export annotated batch</button>
</div>

<div class="wrapper">
  <div class="doc-col">
    <div class="card">
      <div class="doc-id" id="doc-id">Load a batch file to begin.</div>
      <div class="doc-status" id="doc-status"></div>
      <div class="labelbar" id="labelbar"></div>
      <div id="doc"></div>
    </div>
  </div>

  <div class="side-col">
    <div class="card">
      <div class="panel-title">Entities</div>
      <div class="panel-hint">Select text → label (or press 1–9). Remove via ✕ here or by hovering a highlight. Click an OFAC ID to edit.</div>
      <div id="entity-list"></div>
    </div>
  </div>
</div>

<div id="modal-bg"></div>
<div id="modal">
  <p>Set OFAC ID for: <strong id="modal-span"></strong></p>
  <input type="text" id="modal-input" placeholder="e.g. OFAC_1234 (blank keeps FILL)">
  <div class="row">
    <button class="btn" id="modal-cancel">Cancel</button>
    <button class="btn primary" id="modal-save">Save</button>
  </div>
</div>

<div id="toast"></div>
<div id="ent-x" title="Remove entity">✕</div>

<script>
"use strict";
const FILL = "FILL";
const PALETTE = ['#2563eb','#dc2626','#16a34a','#9333ea','#ea580c','#0891b2','#ca8a04','#db2777','#4f46e5','#65a30d'];

let batch = [];        // [{id, text, entities:[{startOffset,endOffset,label}], meta:{startOffset->{...}}}]
let labels = ["FTO","ORG","POI"];
let labelColor = {};
let current = 0;
let pending = null;    // pending text selection {startOffset,endOffset}
let modalStart = null; // startOffset of entity being edited in the modal

const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $("toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(toast._t); toast._t = setTimeout(() => t.style.display = "none", 1600);
}
function colorFor(label) { return labelColor[label] || "#666"; }

// ---------- Loading ----------
function loadBatch(obj) {
  const docs = Array.isArray(obj) ? obj : (obj.documents || []);
  labels = (obj && obj.labels) || labels;
  labelColor = {};
  labels.forEach((l, i) => labelColor[l] = PALETTE[i % PALETTE.length]);

  batch = docs.map((d, i) => {
    const ents = (d.initialEntities || d.entities || []).map(e => ({
      startOffset: e.startOffset, endOffset: e.endOffset, label: e.label
    }));
    const meta = {};
    (d.metaData || []).forEach(m => meta[m.startOffset] = Object.assign({}, m));
    // humanReviewRequired: true = not yet reviewed, false = finished. Default true
    // (unseen). Accepts either casing on input.
    const rr = (d.humanReviewRequired !== undefined) ? d.humanReviewRequired
             : (d.HumanReviewRequired !== undefined) ? d.HumanReviewRequired : true;
    return { id: d.id || d.file || ("doc_" + (i + 1)), text: d.text || d.source || "",
             entities: ents, meta: meta, reviewRequired: !!rr };
  });
  pending = null;
  current = firstUnreviewed();          // resume at the first doc still needing review
  renderLabelBar();
  renderAll();
  updateReviewStat();
  $("prev").disabled = $("next").disabled = batch.length <= 1;
  $("export").disabled = batch.length === 0;
  if (!batch.length) { $("doc-id").textContent = "Batch file had no documents."; return; }
  const done = reviewedCount();
  toast("Loaded " + batch.length + " docs — " + done + " reviewed, " + (batch.length - done) + " remaining");
}

// ---------- Document rendering + selection ----------
function renderLabelBar() {
  const bar = $("labelbar"); bar.innerHTML = "";
  labels.forEach((l, i) => {
    const b = document.createElement("button");
    b.className = "lbl";
    b.textContent = (i < 9) ? (l + " (" + (i + 1) + ")") : l;   // shortcut hint for first 9
    b.style.background = colorFor(l);
    b.addEventListener("click", () => applyLabel(l));
    bar.appendChild(b);
  });
  const hint = document.createElement("span");
  hint.className = "hint"; hint.textContent = "(select text, then click a label or press 1–9)";
  bar.appendChild(hint);
}

function renderDoc() {
  hideEntX();
  const doc = batch[current];
  const c = $("doc"); c.innerHTML = "";
  const ents = [...doc.entities].sort((a, b) => a.startOffset - b.startOffset);
  let pos = 0;
  ents.forEach(e => {
    if (e.startOffset > pos) c.appendChild(document.createTextNode(doc.text.slice(pos, e.startOffset)));
    const span = document.createElement("span");
    span.className = "ent";
    span.dataset.start = e.startOffset;
    span.style.background = colorFor(e.label) + "33";        // translucent fill
    span.style.boxShadow = "inset 0 -2px 0 " + colorFor(e.label);
    span.textContent = doc.text.slice(e.startOffset, e.endOffset);   // ONLY entity text -> #doc offsets stay exact
    span.title = e.label + " — hover for ✕ to remove; click to scroll to its card";
    span.addEventListener("click", ev => { ev.stopPropagation(); flashCard(e.startOffset); });
    span.addEventListener("mouseenter", () => showEntX(span, e.startOffset));
    span.addEventListener("mouseleave", scheduleHideEntX);
    c.appendChild(span);
    pos = e.endOffset;
  });
  if (pos < doc.text.length) c.appendChild(document.createTextNode(doc.text.slice(pos)));
}

// Absolute character offset of a DOM point within #doc (robust via Range.toString()).
function absOffset(node, nodeOffset) {
  const r = document.createRange();
  r.setStart($("doc"), 0);
  r.setEnd(node, nodeOffset);
  return r.toString().length;
}

$("doc").addEventListener("mouseup", () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !batch.length) { pending = null; return; }
  const range = sel.getRangeAt(0);
  if (!$("doc").contains(range.commonAncestorContainer)) { pending = null; return; }
  let s = absOffset(range.startContainer, range.startOffset);
  let e = absOffset(range.endContainer, range.endOffset);
  if (s > e) { const t = s; s = e; e = t; }
  const text = batch[current].text;
  while (s < e && /\s/.test(text[s])) s++;        // trim whitespace at ends
  while (e > s && /\s/.test(text[e - 1])) e--;
  pending = (e > s) ? { startOffset: s, endOffset: e } : null;
});

function applyLabel(label) {
  if (!batch.length) return;
  if (!pending) { toast("Select some text first"); return; }
  const doc = batch[current];
  const overlaps = doc.entities.some(x => pending.startOffset < x.endOffset && x.startOffset < pending.endOffset);
  if (overlaps) { toast("Overlaps an existing entity"); return; }
  doc.entities.push({ startOffset: pending.startOffset, endOffset: pending.endOffset, label });
  doc.meta[pending.startOffset] = { startOffset: pending.startOffset, endOffset: pending.endOffset, confidence: null, ofacID: FILL };
  pending = null;
  window.getSelection().removeAllRanges();
  renderDoc(); renderEntityList();
}

function removeEntity(startOffset) {
  const doc = batch[current];
  doc.entities = doc.entities.filter(e => e.startOffset !== startOffset);
  delete doc.meta[startOffset];
  renderDoc(); renderEntityList();
}

// ---------- Hover ✕ to remove an entity in the document ----------
// The ✕ is a floating element OUTSIDE #doc, so it never adds characters to the
// document text — selection offsets via Range.toString() stay exact.
let entXStart = null, entXTimer = null;
function showEntX(span, startOffset) {
  clearTimeout(entXTimer);
  entXStart = startOffset;
  const r = span.getBoundingClientRect();
  const x = $("ent-x");
  x.style.left = (r.right - 6) + "px";
  x.style.top = (r.top - 8) + "px";
  x.style.display = "block";
}
function scheduleHideEntX() { clearTimeout(entXTimer); entXTimer = setTimeout(hideEntX, 180); }
function hideEntX() { clearTimeout(entXTimer); $("ent-x").style.display = "none"; entXStart = null; }
$("ent-x").addEventListener("mouseenter", () => clearTimeout(entXTimer));   // moving onto the ✕ keeps it open
$("ent-x").addEventListener("mouseleave", scheduleHideEntX);
$("ent-x").addEventListener("click", () => { if (entXStart !== null) { const s = entXStart; hideEntX(); removeEntity(s); } });
window.addEventListener("scroll", hideEntX, true);

// ---------- Entity side list ----------
function flashCard(startOffset) {
  const el = document.querySelector('.ent-item[data-start="' + startOffset + '"]');
  if (el) { el.style.background = "#fff3cd"; setTimeout(() => el.style.background = "#f9f9f9", 1200);
            el.scrollIntoView({ block: "nearest", behavior: "smooth" }); }
}

function renderEntityList() {
  const doc = batch[current];
  const list = $("entity-list"); list.innerHTML = "";
  if (!doc.entities.length) { list.innerHTML = '<div class="muted">No entities yet.</div>'; return; }
  [...doc.entities].sort((a, b) => a.startOffset - b.startOffset).forEach(e => {
    const meta = doc.meta[e.startOffset] || {};
    const ofac = meta.ofacID || FILL;
    const conf = (meta.confidence === null || meta.confidence === undefined) ? "" :
      " &nbsp;·&nbsp; conf " + Number(meta.confidence).toFixed(2);
    const item = document.createElement("div");
    item.className = "ent-item"; item.dataset.start = e.startOffset;
    item.style.borderLeftColor = colorFor(e.label);
    item.innerHTML =
      '<span class="rm" title="Remove">✕</span>' +
      '<div class="span-text">' + escapeHtml(doc.text.slice(e.startOffset, e.endOffset)) + '</div>' +
      '<div class="span-meta">' + escapeHtml(e.label) + ' &nbsp;·&nbsp; ' + e.startOffset + '–' + e.endOffset + conf + '</div>' +
      '<div class="ofac-line">OFAC ID: <span class="ofac-val' + (ofac === FILL ? ' fill' : '') + '">' + escapeHtml(ofac) + '</span>' +
      '<span class="ofac-edit">edit</span></div>';
    item.querySelector(".rm").addEventListener("click", () => removeEntity(e.startOffset));
    item.querySelector(".span-text").addEventListener("click", () => flashDocSpan(e));
    const openEdit = () => openModal(e.startOffset);
    item.querySelector(".ofac-val").addEventListener("click", openEdit);
    item.querySelector(".ofac-edit").addEventListener("click", openEdit);
    list.appendChild(item);
  });
}

function flashDocSpan(e) {
  const s = $("doc").querySelector('.ent[data-start="' + e.startOffset + '"]');
  if (s) {
    s.scrollIntoView({ block: "center", behavior: "smooth" });
    const o = s.style.outline; s.style.outline = "2px solid #ff6600";
    setTimeout(() => s.style.outline = o, 1200);
  }
}

// ---------- OFAC ID modal ----------
function openModal(startOffset) {
  modalStart = startOffset;
  const doc = batch[current];
  const ent = doc.entities.find(e => e.startOffset === startOffset);
  const meta = doc.meta[startOffset] || {};
  $("modal-span").textContent = ent ? doc.text.slice(ent.startOffset, ent.endOffset) : "";
  $("modal-input").value = (meta.ofacID && meta.ofacID !== FILL) ? meta.ofacID : "";
  $("modal-bg").style.display = "block"; $("modal").style.display = "block";
  $("modal-input").focus();
}
function closeModal() { modalStart = null; $("modal-bg").style.display = "none"; $("modal").style.display = "none"; }
function saveModal() {
  if (modalStart !== null) {
    const doc = batch[current];
    const rec = doc.meta[modalStart] || { startOffset: modalStart, confidence: null };
    const ent = doc.entities.find(e => e.startOffset === modalStart);
    if (ent) rec.endOffset = ent.endOffset;
    const v = $("modal-input").value.trim();
    rec.ofacID = v || FILL;
    doc.meta[modalStart] = rec;
    renderEntityList();
  }
  closeModal();
}
$("modal-cancel").addEventListener("click", closeModal);
$("modal-bg").addEventListener("click", closeModal);
$("modal-save").addEventListener("click", saveModal);
$("modal-input").addEventListener("keydown", e => { if (e.key === "Enter") saveModal(); });

// ---------- Review status (start / stop) ----------
function firstUnreviewed() { const i = batch.findIndex(d => d.reviewRequired); return i < 0 ? 0 : i; }
function reviewedCount() { return batch.filter(d => !d.reviewRequired).length; }
function updateReviewStat() {
  $("review-stat").textContent = batch.length ? ("Reviewed " + reviewedCount() + " / " + batch.length) : "";
  $("next-unreviewed").disabled = !batch.some(d => d.reviewRequired);
}
function renderDocStatus() {
  const el = $("doc-status"); el.innerHTML = "";
  if (!batch.length) return;
  const d = batch[current];
  const pill = document.createElement("span");
  pill.className = "pill " + (d.reviewRequired ? "todo" : "done");
  pill.textContent = d.reviewRequired ? "● Needs review" : "✓ Reviewed";
  const btn = document.createElement("button");
  btn.className = "btn";
  btn.textContent = d.reviewRequired ? "Mark reviewed" : "Mark needs review";
  btn.addEventListener("click", toggleReview);
  el.appendChild(pill); el.appendChild(btn);
}
function toggleReview() {
  if (!batch.length) return;
  batch[current].reviewRequired = !batch[current].reviewRequired;
  renderDocStatus(); updateReviewStat();
}
function gotoNextUnreviewed() {
  if (!batch.length) return;
  for (let k = 1; k <= batch.length; k++) {
    const i = (current + k) % batch.length;
    if (batch[i].reviewRequired) { current = i; pending = null; renderAll(); return; }
  }
  toast("All documents reviewed");
}
$("next-unreviewed").addEventListener("click", gotoNextUnreviewed);

// ---------- Navigation + export ----------
function renderAll() {
  if (!batch.length) { $("doc").innerHTML = ""; $("entity-list").innerHTML = ""; $("doc-status").innerHTML = ""; $("pos").textContent = "— / —"; $("doc-id").textContent = "No documents."; return; }
  $("doc-id").textContent = "Document: " + batch[current].id;
  $("pos").textContent = (current + 1) + " / " + batch.length;
  renderDocStatus();
  renderDoc(); renderEntityList();
}
function go(delta) {
  if (!batch.length) return;
  current = Math.max(0, Math.min(batch.length - 1, current + delta));
  pending = null; renderAll();
}
$("prev").addEventListener("click", () => go(-1));
$("next").addEventListener("click", () => go(1));

// ---------- Keyboard: press 1–9 to apply the matching label to the selection ----------
document.addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;            // leave Cmd/Ctrl/Alt+digit to the browser
  if ($("modal").style.display === "block") return;          // OFAC editor open
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA")) return;
  if (!batch.length || e.key < "1" || e.key > "9") return;
  const idx = e.key.charCodeAt(0) - 49;                       // '1' -> index 0
  if (idx < labels.length) { e.preventDefault(); applyLabel(labels[idx]); }
});

function exportBatch() {
  const out = { documents: batch.map(d => {
    const ents = [...d.entities].sort((a, b) => a.startOffset - b.startOffset)
      .map(e => ({ startOffset: e.startOffset, endOffset: e.endOffset, label: e.label }));
    const metaData = ents.map(e => {
      const m = d.meta[e.startOffset] || {};
      const o = { startOffset: e.startOffset, endOffset: e.endOffset,
                  confidence: (m.confidence === undefined ? null : m.confidence) };
      if (m.ofacID && m.ofacID !== FILL) o.ofacID = m.ofacID;   // drop FILL placeholder
      return o;
    });
    return { file: d.id, text: d.text, humanReviewRequired: d.reviewRequired, entities: ents, metaData: metaData };
  }) };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "annotated_batch.json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
  toast("Exported " + batch.length + " documents");
}
$("export").addEventListener("click", exportBatch);

// ---------- File inputs ----------
function readJsonFile(input, cb) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { try { cb(JSON.parse(r.result)); } catch (e) { alert("Invalid JSON: " + e.message); } };
  r.readAsText(f);
}
$("file-batch").addEventListener("change", e => readJsonFile(e.target, loadBatch));

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
</script>
</body>
</html>
