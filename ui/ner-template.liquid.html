<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NER Annotation Viewer</title>
  <script src="https://assets.crowd.aws/crowd-html-elements.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 1rem; }
    .wrapper { display: flex; gap: 16px; align-items: flex-start; }
    .crowd-container { flex: 1; }
    .right-panel {
      width: 300px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .panel-hint { font-size: 11px; color: #aaa; margin-bottom: 8px; }
    .entity-list-item {
      background: #f9f9f9;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #111;
      border-left: 3px solid transparent;
      margin-bottom: 8px;
    }
    .entity-list-item .span-text { font-weight: 600; font-size: 13px; cursor: pointer; }
    .entity-list-item .span-meta { color: #888; margin-top: 2px; }
    .ofac-id-line { margin-top: 6px; font-size: 12px; color: #333; }
    .ofac-id-value {
      cursor: pointer; font-weight: 600;
      border-bottom: 1px dashed #999; padding-bottom: 1px;
    }
    .ofac-id-value.fill { color: #b45309; }     /* highlight unfilled placeholders */
    .ofac-id-edit { color: #2563eb; margin-left: 6px; cursor: pointer; font-size: 11px; }

    #ofac-modal {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1.25rem;
      z-index: 9999;
      width: 280px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    #ofac-modal p { font-size: 13px; color: #555; margin-bottom: 8px; }
    #ofac-modal strong { color: #111; }
    #ofac-modal input {
      width: 100%; padding: 6px 8px;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; margin-bottom: 10px;
    }
    #ofac-modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    #ofac-modal-buttons button {
      padding: 5px 14px; border-radius: 6px;
      font-size: 13px; cursor: pointer; border: 1px solid #ddd;
    }
    #ofac-confirm { background: #111; color: #fff; border-color: #111; }
    #ofac-skip { background: #fff; color: #555; }
  </style>
</head>
<body>

<!--
  Bindings supplied by the pre-annotation Lambda's taskInput:
    task.input.taskObject      -> raw document text
    task.input.labels          -> JSON array of entity labels (strings or {label,...})
    task.input.initialEntities -> JSON array of seed spans { startOffset, endOffset, label } (may be [])
    task.input.metaData        -> JSON array of { startOffset, endOffset, confidence, ofacID } (parallel to initialEntities)
-->

<crowd-form>
  <div class="wrapper">
    <div class="crowd-container">
      <crowd-entity-annotation
        name="annotatedResult"
        header="Highlight and label each entity. Add or remove spans freely, then click an entity's OFAC ID to set it."
        labels="{{ task.input.labels | to_json }}"
        text="{{ task.input.taskObject }}"
        initial-value="{{ task.input.initialEntities | to_json }}">
      </crowd-entity-annotation>
    </div>

    <div class="right-panel">
      <div>
        <div class="panel-title">Entities</div>
        <div class="panel-hint">Click an OFAC ID to enter / edit it. "FILL" means not yet set.</div>
        <div id="entity-list"></div>
      </div>
    </div>
  </div>
  <!--
    Carries the annotator-authored metaData (confidence + entered ofacID, kept in
    sync with adds/removes/edits) into the submitted annotation. A crowd-form
    serializes named inputs inside it, so it reaches the consolidation Lambda.
  -->
  <input type="hidden" name="metaData" id="meta-data" value="[]">
</crowd-form>

<div id="meta-data-raw" style="display:none;">{{ task.input.metaData | to_json }}</div>
<div id="labels-raw" style="display:none;">{{ task.input.labels | to_json }}</div>

<script>
  // --- Label color map -------------------------------------------------------
  // Derived from task.input.labels so the entity list border colors stay in
  // sync with whatever label set the labeling job is configured with.
  const PALETTE = ['#2563eb', '#dc2626', '#16a34a', '#9333ea', '#ea580c',
                   '#0891b2', '#ca8a04', '#db2777', '#4f46e5', '#65a30d'];
  const rawLabels = JSON.parse(document.getElementById('labels-raw').textContent || '[]');
  const labelMap = {};
  rawLabels.forEach((l, i) => {
    const name = (typeof l === 'string') ? l : l.label;
    labelMap[name] = { textColor: PALETTE[i % PALETTE.length] };
  });

  const FILL = "FILL";

  // --- metaData --------------------------------------------------------------
  // Seeded from task.input.metaData: { startOffset, endOffset, confidence, ofacID }.
  // Keyed by startOffset so it can be looked up per span and edited in place.
  const seedMeta = JSON.parse(document.getElementById('meta-data-raw').textContent || '[]');
  const metaMap = {};
  seedMeta.forEach(m => metaMap[m.startOffset] = m);

  // Serialize the current metaData into the hidden form field so it is submitted
  // with the annotation. Called on init and after every add/remove/edit.
  function syncMetaData() {
    const field = document.getElementById('meta-data');
    if (field) field.value = JSON.stringify(Object.values(metaMap));
  }
  syncMetaData();

  // Bring metaMap in line with the current entity spans: add a placeholder record
  // for any new span, drop records for removed spans. Confidence is null for
  // human-added spans (no model score); ofacID defaults to the FILL placeholder.
  function reconcileMeta(entities) {
    const present = new Set(entities.map(e => e.startOffset));
    Object.keys(metaMap).forEach(k => {
      if (!present.has(Number(k))) delete metaMap[k];
    });
    entities.forEach(e => {
      if (!(e.startOffset in metaMap)) {
        metaMap[e.startOffset] = {
          startOffset: e.startOffset,
          endOffset: e.endOffset,
          confidence: null,
          ofacID: FILL,
        };
      }
    });
    syncMetaData();
  }

  function scrollToEntityInDoc(spanText) {
    const crowdEl = document.querySelector('crowd-entity-annotation');
    try {
      const shadowRoot = crowdEl.shadowRoot;
      if (shadowRoot) {
        const allSpans = shadowRoot.querySelectorAll('span');
        for (const span of allSpans) {
          if (span.textContent.trim() === spanText.trim()) {
            span.scrollIntoView({ behavior: 'smooth', block: 'center' });
            const original = span.style.outline;
            span.style.outline = '2px solid #ff6600';
            setTimeout(() => span.style.outline = original, 1500);
            return;
          }
        }
      }
    } catch (e) {}
    crowdEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderEntityList(entities, text) {
    const entityList = document.getElementById("entity-list");
    entityList.innerHTML = '';
    [...entities]
      .sort((a, b) => a.startOffset - b.startOffset)
      .forEach(ann => {
        const lInfo = labelMap[ann.label] || { textColor: "#333" };
        const spanText = text.slice(ann.startOffset, ann.endOffset);
        const meta = metaMap[ann.startOffset] || {};
        const ofacId = meta.ofacID || FILL;
        const conf = (meta.confidence === null || meta.confidence === undefined)
          ? '' : ` &nbsp;·&nbsp; conf ${Number(meta.confidence).toFixed(2)}`;

        const item = document.createElement("div");
        item.className = "entity-list-item";
        item.style.borderLeftColor = lInfo.textColor;
        item.innerHTML =
          `<div class="span-text">${spanText}</div>
           <div class="span-meta">${ann.label} &nbsp;·&nbsp; ${ann.startOffset}–${ann.endOffset}${conf}</div>
           <div class="ofac-id-line">OFAC ID:
             <span class="ofac-id-value${ofacId === FILL ? ' fill' : ''}">${ofacId}</span>
             <span class="ofac-id-edit">edit</span>
           </div>`;

        // Click the span text -> scroll to it in the document.
        item.querySelector('.span-text').addEventListener('click', () => {
          item.style.background = '#fff3cd';
          setTimeout(() => item.style.background = '#f9f9f9', 1500);
          scrollToEntityInDoc(spanText);
        });
        // Click the OFAC ID (or "edit") -> open the edit modal for this span.
        const openEdit = (ev) => { ev.stopPropagation(); openOfacModal(ann, spanText); };
        item.querySelector('.ofac-id-value').addEventListener('click', openEdit);
        item.querySelector('.ofac-id-edit').addEventListener('click', openEdit);

        entityList.appendChild(item);
      });
  }

  // Initial render from the crowd element's initial-value (works without GT runtime).
  document.addEventListener('DOMContentLoaded', () => {
    const crowdEl = document.querySelector('crowd-entity-annotation');
    const text = crowdEl.getAttribute('text');
    const initialEntities = JSON.parse(crowdEl.getAttribute('initial-value') || '[]');
    renderEntityList(initialEntities, text);
  });

  // Live updates inside Ground Truth: reconcile metaData with add/remove, re-render.
  document.addEventListener('all-crowd-elements-ready', () => {
    const crowdEl = document.querySelector('crowd-entity-annotation');
    const text = crowdEl.getAttribute('text');
    crowdEl.addEventListener('change', () => {
      const updated = crowdEl.value?.entities || [];
      reconcileMeta(updated);       // no forced prompt -- spans can be added/removed freely
      renderEntityList(updated, text);
    });
  });

  // --- OFAC ID edit modal ----------------------------------------------------
  let pendingSpan = null;
  function openOfacModal(span, spanText) {
    pendingSpan = span;
    const meta = metaMap[span.startOffset] || {};
    document.getElementById('ofac-modal-span').textContent = spanText;
    const input = document.getElementById('ofac-id-input');
    const current = meta.ofacID && meta.ofacID !== FILL ? meta.ofacID : '';
    input.value = current;
    document.getElementById('ofac-modal').style.display = 'block';
    input.focus();
  }
  function closeOfacModal() {
    pendingSpan = null;
    document.getElementById('ofac-modal').style.display = 'none';
  }
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('ofac-skip').addEventListener('click', closeOfacModal);
    document.getElementById('ofac-confirm').addEventListener('click', () => {
      if (pendingSpan) {
        const val = document.getElementById('ofac-id-input').value.trim();
        const rec = metaMap[pendingSpan.startOffset] || {
          startOffset: pendingSpan.startOffset,
          endOffset: pendingSpan.endOffset,
          confidence: null,
        };
        rec.ofacID = val || FILL;   // empty resets to the FILL placeholder
        metaMap[pendingSpan.startOffset] = rec;
        syncMetaData();             // push the entered ID into the submitted form data
        const crowdEl = document.querySelector('crowd-entity-annotation');
        const text = crowdEl.getAttribute('text');
        renderEntityList(crowdEl.value?.entities
          || JSON.parse(crowdEl.getAttribute('initial-value') || '[]'), text);
      }
      closeOfacModal();
    });
  });
</script>


<!-- OFAC ID edit modal -->
<div id="ofac-modal">
  <p>Set OFAC ID for: <strong id="ofac-modal-span"></strong></p>
  <p>Enter an OFAC ID (leave blank to keep "FILL"):</p>
  <input type="text" id="ofac-id-input" placeholder="e.g. OFAC_1234" />
  <div id="ofac-modal-buttons">
    <button id="ofac-skip">Cancel</button>
    <button id="ofac-confirm">Save</button>
  </div>
</div>

</body>
</html>
